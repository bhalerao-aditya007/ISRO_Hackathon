services:
  - type: web
    name: prism-api
    runtime: python
    region: oregon          # choose closest to your users
    plan: free              # upgrade to starter for always-on (no spin-down)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.backend:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

